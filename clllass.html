<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Salary Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f3;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      width: min(90%, 700px);
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    input {
      width: calc(100% - 24px);
      max-width: 400px;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }

    button {
      padding: 10px 14px;
      margin: 6px 4px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: #1e7e34;
    }

    #output {
      margin-top: 20px;
      text-align: left;
      line-height: 1.6;
    }

    #output h3 {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Employee Salary Management System</h2>
    <input type="text" id="name" placeholder="Employee Name">
    <input type="text" id="empId" placeholder="Employee ID">
    <input type="number" id="salary" placeholder="Salary">
    <input type="text" id="dept" placeholder="Department">
    <div>
      <button onclick="addEmployee()">Add Employee</button>
      <button onclick="displayEmployees()">Display All</button>
      <button onclick="filterSalary()">Salary &gt; 50000</button>
      <button onclick="totalSalary()">Total Salary</button>
      <button onclick="averageSalary()">Average Salary</button>
      <button onclick="countDepartment()">Count by Department</button>
    </div>
    <div id="output"></div>
  </div>

  <script>
    let employees = [];

    function addEmployee() {
      const name = document.getElementById("name").value.trim();
      const empId = document.getElementById("empId").value.trim();
      const salary = parseFloat(document.getElementById("salary").value);
      const dept = document.getElementById("dept").value.trim();

      if (!name || !empId || isNaN(salary) || !dept) {
        alert("Please fill all fields properly.");
        return;
      }

      employees.push({
        name,
        id: empId,
        salary,
        department: dept
      });

      alert("Employee added successfully!");
      document.getElementById("name").value = "";
      document.getElementById("empId").value = "";
      document.getElementById("salary").value = "";
      document.getElementById("dept").value = "";
      document.getElementById("output").innerHTML = "";
    }

    function displayEmployees() {
      if (employees.length === 0) {
        document.getElementById("output").innerHTML = "<h3>No employees added yet.</h3>";
        return;
      }

      let output = "<h3>All Employees</h3>";
      employees.forEach(emp => {
        output += `<div>Name: ${emp.name} | ID: ${emp.id} | Salary: ₹${emp.salary.toFixed(2)} | Dept: ${emp.department}</div>`;
      });
      document.getElementById("output").innerHTML = output;
    }

    function filterSalary() {
      const filtered = employees.filter(emp => emp.salary > 50000);
      if (filtered.length === 0) {
        document.getElementById("output").innerHTML = "<h3>No employees with salary above ₹50,000.</h3>";
        return;
      }
      let output = "<h3>Employees with Salary &gt; ₹50,000</h3>";
      filtered.forEach(emp => {
        output += `<div>Name: ${emp.name} | Salary: ₹${emp.salary.toFixed(2)}</div>`;
      });
      document.getElementById("output").innerHTML = output;
    }

    function totalSalary() {
      if (employees.length === 0) {
        document.getElementById("output").innerHTML = "<h3>No employee records available.</h3>";
        return;
      }
      const total = employees.reduce((sum, emp) => sum + emp.salary, 0);
      document.getElementById("output").innerHTML = `<h3>Total Salary Payout: ₹${total.toFixed(2)}</h3>`;
    }

    function averageSalary() {
      if (employees.length === 0) {
        document.getElementById("output").innerHTML = "<h3>No employee records available.</h3>";
        return;
      }
      const total = employees.reduce((sum, emp) => sum + emp.salary, 0);
      const avg = total / employees.length;
      document.getElementById("output").innerHTML = `<h3>Average Salary: ₹${avg.toFixed(2)}</h3>`;
    }

    function countDepartment() {
      if (employees.length === 0) {
        document.getElementById("output").innerHTML = "<h3>No employee records available.</h3>";
        return;
      }
      const deptName = prompt("Enter Department Name:").trim();
      if (!deptName) {
        alert("Please enter a department name.");
        return;
      }
      const count = employees.filter(emp => emp.department.toLowerCase() === deptName.toLowerCase()).length;
      document.getElementById("output").innerHTML = `<h3>Employees in ${deptName}: ${count}</h3>`;
    }
  </script>
</body>
</html>
