<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 9 - Product Grid</title>
    <style>
        body {
                        
            background: #f5f5f5;
            padding: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            
            gap: 20px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 16px;
            text-align: center;
        }
        .card img {
            width: 50%;
           
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .card h3 {
            font-size: 18px;
            margin: 8px 0;
        }
        .card p {
            font-size: 14px;
            color:rgba(1,0,1);
            margin: 4px 0;
        }
        .price {
            font-weight: bold;
           
        }
                
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h2>Responsive Product Grid</h2>
    <div class="grid">
        <div class="card">
            <img src="C:\Users\krish\Downloads\shirt.jpg">
            <h3>Product 1</h3>
            <p></p>
            <p class="price">₹499</p>
        </div>
        <div class="card">
            <img src="https://assets.ajio.com/medias/sys_master/root/20240929/B2jg/66f8de07260f9c41e83d7c48/-473Wx593H-700508462-offwhite-MODEL.jpg">
            <h3>Product 2</h3>
            <p>Durable and stylish for daily use.</p>
            <p class="price">₹799</p>
        </div>
        <div class="card">
            <img src="C:\Users\krish\Downloads\shirt.webp">
            <h3>Product 3</h3>
            <p>Lightweight and comfortable.</p>
            <p class="price">₹1,299</p>
        </div>
        <div class="card">
            <img src="C:\Users\krish\Downloads\shoes.jpg">
            <h3>Product 4</h3>
            <p> premium quality product .</p>
            <p class="price">₹999</p>
        </div>
    </div>
</body>
</html>
